name: CI/CD Pipeline - MERN DevSecOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Étape 2 : Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Étape 3 : Installer les dépendances frontend
      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      # Étape 4 : Builder le frontend
      - name: Build frontend
        run: |
          cd client
          npm run build

      # Étape 5 : Installer les dépendances backend
      - name: Install backend dependencies
        run: |
          cd server
          npm install

      # Étape 6 : SCA - npm audit frontend
      - name: SCA - npm audit frontend
        run: |
          cd client
          npm audit --audit-level=high || true

      # Étape 7 : SCA - npm audit backend
      - name: SCA - npm audit backend
        run: |
          cd server
          npm audit --audit-level=high || true

      # Étape 8 : SAST - SonarCloud
      - name: SAST - SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=firasktib
            -Dsonar.projectKey=FIRASKTIB_mern-devsecops
            -Dsonar.sources=.
            -Dsonar.host.url=https://sonarcloud.io

      # Étape 9 : Builder les images Docker
      - name: Build Docker images
        run: |
          docker compose build
      # Étape 10 : Démarrer l'application pour le DAST
      - name: Start application for DAST
        run: |
          docker compose up -d
          sleep 30

      # Étape 11 : DAST - OWASP ZAP
      - name: DAST - OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'

      # Étape 12 : Arrêter l'application
      - name: Stop application
        run: |
          docker compose down